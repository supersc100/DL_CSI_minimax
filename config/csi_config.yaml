# CSI Feedback Model Configuration

model:
  # Path to Qwen2 model (实际是Qwen2-1.5B，非DeepSeek)
  model_path: "./models/deepseek-1_5b"

  # Fallback hidden_dim / max_seq_len (实际从模型 config.json 自动读取)
  hidden_dim: 1536
  max_seq_len: 2048

  # Use flash attention for better memory efficiency
  use_flash_attention: false

data:
  # CSI data parameters
  seq_len: 128           # Sequence length for each CSI sample

environment:
  # Enable Phase 2: environmental info integration
  enabled: false

  # Number of dominant paths to extract for angles/delays
  num_dominant_paths: 5

  # Path phase dimension (from CDL num_paths)
  phase_dim: 20

  # Angles/delays dimension: num_dominant_paths * 4 (AoD, AoA, delay, power)
  angles_delays_dim: 20

lora:
  # LoRA fine-tuning configuration
  enabled: true
  rank: 8                # LoRA rank (common: 4, 8, 16)
  alpha: 16              # LoRA alpha (usually 2 * rank)
  dropout: 0.05          # LoRA dropout
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

training:
  # Training hyperparameters
  epochs: 10
  batch_size: 1          # Adjust based on GPU memory
  gradient_accumulation_steps: 8   # Effective batch_size = batch_size * grad_accum
  learning_rate: 1e-4    # LoRA 推荐 LR (全量微调建议 1e-5)
  weight_decay: 0.01
  warmup_ratio: 0.1      # 前 10% steps 线性 warmup

  # Gradient clipping
  grad_clip: 1.0

  # Logging and checkpointing
  eval_every: 100        # Steps between evaluations (按优化步计数)
  save_every: 500        # Steps between checkpoints (按优化步计数)
  log_every: 10          # Steps between log outputs (按优化步计数)

  # Limit training steps (useful for debugging)
  max_steps: null

  # Number of data loading workers
  num_workers: 2

  # Random seed for reproducibility
  seed: 42
